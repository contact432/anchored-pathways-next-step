function renderScholarshipResultsInto(container){
  container.innerHTML='';
  const results = getFilteredScholarships();
  const summary=el('p','es');
  summary.style.margin='0 18px 10px';
  summary.textContent = hasActiveScholarshipFilters()
    ? (isEn()?`${results.length} results appear to match some of the filters you selected.`:`${results.length} resultados parecen coincidir con algunos de los filtros que elegiste.`)
    : (isEn()?`${results.length} total, all worth a look.`:`${results.length} en total, todas valen la pena explorar.`);
  container.appendChild(summary);
  if(results.length===0){
    const q = state.scholarshipSearch.trim();
    const empty=el('div','card');
    empty.appendChild(el('h4','', q
      ? (isEn()?`We couldn't find scholarships in this collection specifically tagged for "${q}."`:`No encontramos becas en esta colección específicamente etiquetadas para "${q}."`)
      : (isEn()?"We couldn't find scholarships matching those filters in this collection.":'No encontramos becas que coincidan con esos filtros en esta colección.')));
    empty.appendChild(el('p','', isEn()
      ? "This collection is curated, not complete, so this doesn't mean there's nothing out there for you. Most scholarships here don't require a specific major, and here's where to go next:"
      : 'Esta colección es curada, no completa, así que esto no significa que no haya nada disponible para ti. La mayoría de las becas aquí no requieren una carrera específica, y aquí tienes dónde seguir buscando:'));
    const allBtn=el('button','secondary-btn', isEn()?'Browse All Scholarships':'Explorar Todas las Becas');
    allBtn.onclick=()=>{ state.scholarshipCategory=null; clearScholarshipFilters(); render(); };
    empty.appendChild(allBtn);
    const hubBtn=el('button','secondary-btn', isEn()?'See Other Ways to Begin':'Ver Otras Formas de Empezar');
    hubBtn.onclick=()=>{ state.screen='apply-scholarships'; render(); };
    empty.appendChild(hubBtn);
    empty.appendChild(el('p','es', isEn()
      ? "Your school's own financial aid office is also a good general resource, and a Navigator can help you look further at Clínica."
      : 'La oficina de ayuda financiera de tu propia escuela también es un buen recurso general, y un Navegador puede ayudarte a buscar más en la Clínica.'));
    const clinicaBtn=el('button','secondary-btn', isEn()?'Talk It Through at Clínica':'Hablarlo en la Clínica');
    clinicaBtn.onclick=()=>{ state.screen='clinica'; render(); };
    empty.appendChild(clinicaBtn);
    container.appendChild(empty);
  } else {
    results.forEach(r=>container.appendChild(scholarshipCard(r)));
  }
}
function renderScholarshipResultsOnly(){
  const container = document.getElementById('scholarship-results');
  if(container) renderScholarshipResultsInto(container);
}

// ---- Detail screen ----
function scholarshipsDetailScreen(){
  const wrap=el('div');
  const r = SCHOLARSHIP_DATA.find(x=>x.id===state.scholarshipDetailId);
  if(!r){ state.screen='apply-scholarships'; return scholarshipsHubScreen(); }
  wrap.appendChild(screenHeader(isEn()?'Details':'Detalles', 'apply-scholarships-list'));

  const card=el('div','card');
  const catLabel = SCHOLARSHIP_CATEGORY_LABELS[r.category];
  card.appendChild(el('div','pill', isEn()?catLabel.en:catLabel.es));
  card.appendChild(el('h2','', scholarshipDisplayName(r)));
  if(r.programName) card.appendChild(el('p','', r.programName));

  const isSaved = state.savedScholarships.includes(r.id);
  const saveBtn=el('button', isSaved?'secondary-btn':'primary-btn', isSaved?(isEn()?'Remove from Saved':'Quitar de Guardadas'):(isEn()?'Save for Later':'Guardar para Después'));
  saveBtn.onclick=()=>{
    const i=state.savedScholarships.indexOf(r.id);
    if(i>-1) state.savedScholarships.splice(i,1); else state.savedScholarships.push(r.id);
    render();
  };
  card.appendChild(saveBtn);
  wrap.appendChild(card);

  const details=el('div','card');
  function row(labelEn, labelEs, value){
    if(!value) return;
    const d=document.createElement('div'); d.style.marginBottom='14px';
    d.innerHTML=`<div style="font-size:11px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px;">${isEn()?labelEn:labelEs}</div><div style="font-size:14px;color:var(--ink);">${value}</div>`;
    details.appendChild(d);
  }
  row('Award Amount','Cantidad de la Beca', bilingualField(r.awardAmountText, r.awardAmountTextEs));
  row('Deadline','Fecha Límite', bilingualField(r.deadlineText, r.deadlineTextEs));
  row('GPA','Promedio', bilingualField(r.gpaText, r.gpaTextEs));
  if(r.eligibilityPlain && r.eligibilityPlain.length>0){
    row('Eligibility Notes','Notas de Elegibilidad', r.eligibilityPlain.map(p=>isEn()?p.en:p.es).join(' · '));
  }
  if(r.verificationStatus && VERIFICATION_COPY[r.verificationStatus]){
    const vc = VERIFICATION_COPY[r.verificationStatus];
    row('Status','Estado', isEn()?vc.en:vc.es);
  }
  if(r.familyNote) row('Worth Knowing','Vale la Pena Saber', isEn() ? r.familyNote : (r.familyNoteEs || r.familyNote));
  if(r.distanceText) row('Location','Ubicación', r.distanceText);
  if(r.priorityTag==='high') row('Note','Nota', isEn()?'Especially relevant for Pasadena/Galena Park families.':'Especialmente relevante para familias de Pasadena/Galena Park.');
  if(r.contactPhone) row('Phone','Teléfono', r.contactPhone);
  if(r.contactEmail) row('Contact','Contacto', r.contactEmail);
  wrap.appendChild(details);

  if(r.urls && r.urls.length>0){
    const urlCard=el('div','card');
    r.urls.forEach((u, i)=>{
      const label = u.label ? `${isEn()?'Visit':'Visitar'} ${u.label}` : (isEn()?'Visit Official Page':'Visitar Página Oficial');
      const urlBtn=el('button', i===0?'primary-btn':'secondary-btn', label);
      urlBtn.onclick=()=>{ window.open(u.url, '_blank', 'noopener,noreferrer'); };
      urlCard.appendChild(urlBtn);
    });
    wrap.appendChild(urlCard);
  }

  const disclaimer=el('div','card');
  disclaimer.appendChild(el('p','', isEn()?"This is general information from AP's own research, not a determination of eligibility. Policies, deadlines, and requirements can change. A Navigator can help you confirm current details at Clínica.":'Esta es información general de la propia investigación de AP, no una determinación de elegibilidad. Las políticas, fechas límite y requisitos pueden cambiar. Un Navegador puede ayudarte a confirmar los detalles actuales en la Clínica.'));
  const clinicaBtn=el('button','secondary-btn', isEn()?'Get Help at Clínica':'Recibe Ayuda en la Clínica');
  clinicaBtn.onclick=()=>{ state.screen='clinica'; render(); };
  disclaimer.appendChild(clinicaBtn);
  wrap.appendChild(disclaimer);

  return wrap;
}

// ---- Saved screen ----
function scholarshipsSavedScreen(){
  const wrap=el('div');
  wrap.appendChild(screenHeader(isEn()?'Saved Scholarships':'Becas Guardadas', 'apply-scholarships'));
  const saved = SCHOLARSHIP_DATA.filter(r=>state.savedScholarships.includes(r.id));
  if(saved.length===0){
    const empty=el('div','locked-card');
    empty.innerHTML=`<div class="lock-ic">🤍</div><p>${isEn()?"Nothing saved yet. Tap Save for Later on anything you want to come back to.":'Aún no has guardado nada. Toca Guardar para Después en lo que quieras volver a ver.'}</p>`;
    wrap.appendChild(empty);
  } else {
    saved.forEach(r=>wrap.appendChild(scholarshipCard(r)));
  }
  return wrap;
}

/* ============ PHASE 1B PROTOTYPE: YOUR LOCAL PATHWAY ============ */

function sourceLine(dateIso, url){
  const wrap=el('div');
  wrap.style.marginTop='6px';
  const dateText = formatVerifiedDate(dateIso);
  let html = dateText ? (isEn()?`Based on information verified ${dateText}.`:`Basado en información verificada el ${dateText}.`) : '';
  wrap.innerHTML = `<span style="font-size:11px;color:var(--ink-soft);">${html}</span>`;
  if(url){
    const link=document.createElement('button');
    link.textContent = isEn()?' See where this came from':' Ver de dónde viene esto';
    link.style.cssText='background:none;border:none;color:var(--teal-deep);font-size:11px;text-decoration:underline;cursor:pointer;padding:0;font-family:var(--font-body);';
    link.onclick=()=>{ window.open(url, '_blank', 'noopener,noreferrer'); };
    wrap.appendChild(link);
  }
  return wrap;
}

function localPathwayEntryScreen(){
  const wrap=el('div');
  wrap.appendChild(screenHeader(isEn()?'Your Local Pathway':'Tu Camino Local', 'apply'));

  const card=el('div','card');
  card.appendChild(el('h2','', isEn()?'Your Local Pathway':'Tu Camino Local'));
  card.appendChild(el('p','', isEn()
    ? "Tell us which high school you or your student is connected to, and we'll show you local programs, college pathways, and scholarships that may be relevant. This is optional, and your selection will only be used during this visit."
    : 'Dinos con qué preparatoria estás conectado tú o tu estudiante, y te mostraremos programas locales, caminos hacia la universidad y becas que podrían ser relevantes. Esto es opcional, y tu selección solo se usará durante esta visita.'));
  wrap.appendChild(card);

  const formCard=el('div','card');
  const mode = state.localPathwayMode;
  const D = POSTSECONDARY_DATA;

  const f1=el('div','field');
  f1.innerHTML=`<label>${mode==='school' ? (isEn()?'Your high school':'Tu escuela preparatoria') : (isEn()?'Your district':'Tu distrito')}</label>`;
  const sel=document.createElement('select');
  const placeholderOpt=document.createElement('option');
  placeholderOpt.value=''; placeholderOpt.textContent=mode==='school' ? (isEn()?'Select a school':'Selecciona una escuela') : (isEn()?'Select a district':'Selecciona un distrito');
  sel.appendChild(placeholderOpt);
  const options = mode==='school' ? Object.values(D.highSchools) : Object.values(D.districts);
  options.sort((a,b)=>(a.school_name||a.district_name).localeCompare(b.school_name||b.district_name));
  options.forEach(o=>{
    const opt=document.createElement('option');
    opt.value = o.school_id || o.district_id;
    opt.textContent = o.school_name || o.district_name;
    if(state.localPathwaySchoolId===opt.value) opt.selected=true;
    sel.appendChild(opt);
  });
  let currentSelection = state.localPathwaySchoolId || '';
  sel.onchange=(e)=>{ currentSelection = e.target.value; primaryBtn.disabled = !currentSelection; };
  f1.appendChild(sel);
  formCard.appendChild(f1);

  const fallbackLine=document.createElement('button');
  fallbackLine.textContent = mode==='school'
    ? (isEn()?"Don't see your school? You can search by district or community instead.":'¿No ves tu escuela? Puedes buscar por distrito o comunidad en su lugar.')
    : (isEn()?'Search by school instead':'Buscar por escuela en su lugar');
  fallbackLine.style.cssText='background:none;border:none;color:var(--teal-deep);font-size:12.5px;text-decoration:underline;cursor:pointer;padding:0;display:block;margin-bottom:14px;font-family:var(--font-body);text-align:left;';
  fallbackLine.onclick=()=>{ state.localPathwayMode = mode==='school' ? 'district' : 'school'; render(); };
  formCard.appendChild(fallbackLine);

  const primaryBtn=el('button','primary-btn', isEn()?'Show My Local Pathway':'Mostrar Mi Camino Local');
  primaryBtn.disabled = !currentSelection;
  primaryBtn.onclick=()=>{
    if(!currentSelection) return;
    state.localPathwaySchoolId = currentSelection;
    state.screen='apply-local-pathway-result';
    render();
  };
  formCard.appendChild(primaryBtn);

  const skipBtn=el('button','secondary-btn', isEn()?'Skip this for now':'Saltar esto por ahora');
  skipBtn.onclick=()=>{ state.screen='apply'; render(); };
  formCard.appendChild(skipBtn);

  wrap.appendChild(formCard);
  return wrap;
}

function localPathwayResultScreen(){
  const wrap=el('div');
  wrap.appendChild(screenHeader(isEn()?'Your Local Pathway':'Tu Camino Local', 'apply-local-pathway'));

  const result = buildLocalPathway(state.localPathwaySchoolId);
  if(!result){
    const card=el('div','card');
    card.appendChild(el('p','', isEn()?'We could not find that selection. Please try again.':'No pudimos encontrar esa selección. Inténtalo de nuevo.'));
    wrap.appendChild(card);
    return wrap;
  }
  const { hs, dist, dualCredits, cc, taxingRel, promises, transfers, scholarshipList, cta } = result;
  const name = hs ? hs.school_name : dist.district_name;

  // ---- Intro: AP-curated explanation, shown once, near the top ----
  const introCard=el('div','card');
  introCard.appendChild(el('div','pill', isEn()?'SUGGESTED PATH, NOT AN OFFICIAL DECISION':'CAMINO SUGERIDO, NO UNA DECISIÓN OFICIAL'));
  introCard.appendChild(el('h2','', isEn()?`What We Found for ${name}`:`Lo Que Encontramos Para ${name}`));
  introCard.appendChild(el('p','', isEn()
    ? 'Here are some local programs and college connections that may be relevant to students at your school, based on the information verified so far.'
    : 'Estos son algunos programas locales y conexiones con universidades que podrían ser relevantes para estudiantes de tu preparatoria, según la información verificada hasta ahora.'));
  introCard.appendChild(el('p','es', isEn()
    ? 'Anchored Pathways created this suggested path by connecting information verified from several sources. It is meant to help you explore your options, not to serve as an official decision about eligibility, admission, or financial aid.'
    : 'Anchored Pathways creó este camino sugerido conectando información verificada en varias fuentes. Su propósito es ayudarte a explorar tus opciones, no servir como una decisión oficial sobre elegibilidad, admisión o ayuda financiera.'));
  wrap.appendChild(introCard);

  // ---- Your School ----
  if(hs){
    const c=el('div','card');
    c.appendChild(el('div','section-label', isEn()?'Your School':'Tu Escuela'));
    c.appendChild(el('h2','', hs.school_name));
    c.appendChild(el('p','', dist.district_name + (hs.address ? ` · ${hs.address}` : '')));
    c.appendChild(sourceLine(hs.last_verified_date, hs.source_url||hs.website_url));
    wrap.appendChild(c);
  } else {
    const c=el('div','card');
    c.appendChild(el('div','section-label', isEn()?'Your District':'Tu Distrito'));
    c.appendChild(el('h2','', dist.district_name));
    c.appendChild(sourceLine(dist.last_verified_date, dist.source_url||dist.website_url));
    wrap.appendChild(c);
  }

  // ---- Dual Credit ----
  if(dualCredits.length>0){
    const c=el('div','card');
    c.appendChild(el('div','section-label', hs?(isEn()?'Dual Credit at This School':'Crédito Dual en Esta Escuela'):(isEn()?'Dual Credit in This District':'Crédito Dual en Este Distrito')));
    dualCredits.forEach(dc=>{
      const ccName = D_CC_NAME(dc.partner_institution_id);
      c.appendChild(el('p','', isEn()
        ? `${hs?'This school':'This district'} has a dual credit partnership with ${ccName}: ${dc.program_name}.`
        : `${hs?'Esta escuela':'Este distrito'} tiene una colaboración de crédito dual con ${ccName}: ${dc.program_name}.`));
      if(dc.confidence_level!=='verified'){
        c.appendChild(el('p','es', isEn()?"This detail hasn't been fully confirmed yet.":'Este detalle aún no se ha confirmado por completo.'));
      }
      c.appendChild(sourceLine(dc.last_verified_date, dc.official_url));
      c.appendChild(el('div','divider'));
    });
    wrap.appendChild(c);
  }

  // ---- Community College ----
  if(cc){
    const c=el('div','card');
    c.appendChild(el('div','section-label', isEn()?'A Community College Connection':'Una Conexión con un Colegio Comunitario'));
    c.appendChild(el('h2','', cc.college_name));
    c.appendChild(el('p','', isEn()?`${cc.college_name} is a community college connected to this area.`:`${cc.college_name} es un colegio comunitario conectado con esta zona.`));
    c.appendChild(el('p','es', isEn()
      ? 'Whether a specific family qualifies for in-district tuition depends on residency rules we can\'t confirm here. A Navigator can help you check.'
      : 'Si una familia específica califica para la colegiatura interna depende de reglas de residencia que no podemos confirmar aquí. Un Navegador puede ayudarte a revisarlo.'));
    c.appendChild(sourceLine(taxingRel.last_verified_date, taxingRel.source_url));
    wrap.appendChild(c);
  }

  // ---- Promise ----
  if(promises.length>0){
    const c=el('div','card');
    c.appendChild(el('div','section-label', isEn()?'Possible Tuition Help':'Posible Ayuda con la Colegiatura'));
    promises.forEach(p=>{
      c.appendChild(el('h4','', p.program_name));
      c.appendChild(el('p','', isEn()
        ? `You may be able to receive help through ${p.program_name}, depending on requirements such as where you live, your graduation date, application deadlines, and enrollment. Check the program's official requirements or ask a Navigator for help reviewing them.`
        : `Podrías recibir ayuda a través de ${p.program_name}, dependiendo de requisitos como dónde vives, tu fecha de graduación, las fechas límite y tu inscripción. Revisa los requisitos oficiales del programa o pídele ayuda a un Navegador para entenderlos.`));
      if(p.confidence_level!=='verified'){
        c.appendChild(el('p','es', isEn()?"This detail hasn't been fully confirmed yet.":'Este detalle aún no se ha confirmado por completo.'));
      }
      c.appendChild(sourceLine(p.last_verified_date, p.official_url));
      c.appendChild(el('div','divider'));
    });
    wrap.appendChild(c);
  }

  // ---- Transfer ----
  if(transfers.length>0){
    const c=el('div','card');
    c.appendChild(el('div','section-label', isEn()?'Transferring to a University':'Transferirte a una Universidad'));
    transfers.forEach(t=>{
      const uniName = POSTSECONDARY_DATA.universities[t.university_id] ? POSTSECONDARY_DATA.universities[t.university_id].university_name : t.university_id;
      c.appendChild(el('h4','', uniName));
      c.appendChild(el('p','', isEn()
        ? `${uniName} has a transfer agreement connected to ${cc?cc.college_name:'this area'}: ${t.agreement_name}.`
        : `${uniName} tiene un acuerdo de transferencia conectado con ${cc?cc.college_name:'esta zona'}: ${t.agreement_name}.`));
      c.appendChild(el('p','es', isEn()
        ? 'Some students may qualify for guaranteed admission under this agreement, based on requirements we can\'t confirm here.'
        : 'Algunos estudiantes podrían calificar para admisión garantizada bajo este acuerdo, según requisitos que no podemos confirmar aquí.'));
      if(t.confidence_level!=='verified'){
        c.appendChild(el('p','es', isEn()?"This detail hasn't been fully confirmed yet.":'Este detalle aún no se ha confirmado por completo.'));
      }
      c.appendChild(sourceLine(t.last_verified_date, t.official_url));
      c.appendChild(el('div','divider'));
    });
    wrap.appendChild(c);
  }

  // ---- Scholarships: a compact orientation list, not a second browsing experience ----
  if(scholarshipList.length>0){
    const c=el('div','card');
    c.appendChild(el('div','section-label', isEn()?'Scholarships Connected to Your Area':'Becas Conectadas con Tu Zona'));
    const introText = isEn()
      ? `We found ${scholarshipList.length} scholarship${scholarshipList.length===1?'':'s'} connected to your area or school:`
      : `Encontramos ${scholarshipList.length} beca${scholarshipList.length===1?'':'s'} conectada${scholarshipList.length===1?'':'s'} con tu zona o escuela:`;
    c.appendChild(el('p','', introText));
    const shown = scholarshipList.slice(0,3);
    const list=el('ul','step-list');
    shown.forEach((s,i)=>{ const li=el('li'); li.innerHTML=`<span class="step-num">${i+1}</span><span>${s.scholarship_name}</span>`; list.appendChild(li); });
    c.appendChild(list);
    if(scholarshipList.length>3){
      c.appendChild(el('p','es', isEn()?`+ ${scholarshipList.length-3} more like this.`:`+ ${scholarshipList.length-3} más como estas.`));
    }
    c.appendChild(el('p','es', isEn()?'These scholarships were found through your school and local pathway. You can explore more options in Scholarships & Funding.':'Estas becas se encontraron a través de tu escuela y tu camino local. Puedes explorar más opciones en Becas y Ayuda Financiera.'));
    wrap.appendChild(c);
  }

  // ---- Next step, chosen from the strongest verified information available ----
  const ctaCard=el('div','card');
  ctaCard.appendChild(el('div','pill', isEn()?'A GOOD NEXT STEP':'UN BUEN PRÓXIMO PASO'));
  ctaCard.appendChild(renderLocalPathwayCTA(cta));
  wrap.appendChild(ctaCard);

  // ---- Change / Clear ----
  const actionsWrap=document.createElement('div');
  actionsWrap.style.cssText='display:flex; gap:16px; justify-content:center; margin:6px 18px 18px;';
  const changeBtn=document.createElement('button');
  changeBtn.textContent = isEn()?'Change school':'Cambiar escuela';
  changeBtn.style.cssText='background:none;border:none;color:var(--ink-soft);font-size:12px;text-decoration:underline;cursor:pointer;font-family:var(--font-body);';
  changeBtn.onclick=()=>{ state.screen='apply-local-pathway'; render(); };
  const clearBtn=document.createElement('button');
  clearBtn.textContent = isEn()?'Clear my selection':'Borrar mi selección';
  clearBtn.style.cssText='background:none;border:none;color:var(--ink-soft);font-size:12px;text-decoration:underline;cursor:pointer;font-family:var(--font-body);';
  clearBtn.onclick=()=>{ state.localPathwaySchoolId=null; state.localPathwayMode='school'; state.screen='apply-local-pathway'; render(); };
  actionsWrap.appendChild(changeBtn); actionsWrap.appendChild(clearBtn);
  wrap.appendChild(actionsWrap);

  return wrap;
}
function D_CC_NAME(ccId){
  const cc = POSTSECONDARY_DATA.communityColleges[ccId];
  return cc ? cc.college_name : ccId;
}

const PRIVATE_MEETING_FORM_URL = 'https://docs.google.com/forms/d/e/1FAIpQLSfy788vzYrUM8Bo1kWzM1UsmvSmrKJaJxlUyJsvsuf1URRBGg/viewform';

function clinicaScreen(){
  const wrap=el('div');
  wrap.appendChild(screenHeader(isEn()?'Clínica':'Clínica'));

  const card=el('div','card');
  card.appendChild(el('div','pill', isEn()?'DROP-IN · NO COST':'SIN CITA · SIN COSTO'));
  card.appendChild(el('h2','', isEn()?'No appointment needed, just come by':'No necesitas cita, solo ven'));
  card.appendChild(el('p','', isEn()?"Thursdays, 5:00–8:00 PM at East Harris County Activity Center (7340 Spencer Hwy, Pasadena, TX 77505). It's completely free, and there's no sign-up or reserved time, a Navigator will be there to help whoever comes during those hours.":'Los jueves, de 5:00 a 8:00 PM en East Harris County Activity Center (7340 Spencer Hwy, Pasadena, TX 77505). Es completamente gratis, y no hay inscripción ni horario reservado, un Navegador estará ahí para ayudar a quien llegue durante ese horario.'));

    : ['Llenar el FAFSA o TASFA','Buscar becas','Comparar universidad, oficio o aprendizaje','Preguntas sobre estatus migratorio y ayuda financiera, en privado','Cualquier otra cosa que tengas en mente'];

  const card3=el('div','card');

  card3.appendChild(el('p','', isEn()?'No appointment is needed. Clínica is drop-in. This optional form gives us a heads-up about what you may want help with so we can be better prepared. It does not reserve a time or guarantee immediate service.':'No necesitas cita. La Clínica funciona sin cita previa. Este formulario opcional solo nos ayuda a saber con anticipación en qué podrías necesitar apoyo para estar mejor preparados. No reserva un horario ni garantiza atención inmediata.'));
  const btn=el('button','primary-btn', isEn()?'Send an optional heads-up':'Enviar aviso opcional');
  btn.onclick=()=>{ window.open(HEADS_UP_FORM_URL, '_blank', 'noopener,noreferrer'); };

  card4.appendChild(el('p','', isEn()?"Clínica is a group, drop-in setting. If that doesn't feel right for your situation, you can request a one-on-one meeting with a Navigator instead. This is a request, not an instant booking, someone will follow up with you.":'La Clínica es un espacio grupal, sin cita previa. Si eso no se siente adecuado para tu situación, puedes pedir una reunión individual con un Navegador. Esto es una solicitud, no una cita inmediata, alguien te dará seguimiento.'));
