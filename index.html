<style>

  :root {

    --teal-navy: #14505E;
    --teal-mid: #2A8A96;
    --teal-bright: #3AABB8;
    --gold: #F5A623;
    --amber: #E8832A;
    --burnt: #C4612A;
    --white: #FFFFFF;
    --ink: #16323A;
    --ink-soft: #4A6B72;
    --bg: #F7F5F0;
    --card: #FFFFFF;
    --radius: 20px;

    --font-body: 'Questrial', 'Avenir', 'Avenir Next', sans-serif;

  #app { max-width:440px; margin:0 auto; min-height:100vh; background:var(--bg); display:flex; flex-direction:column; position:relative; padding-bottom:84px; }

  .topbar-row { display:flex; align-items:center; justify-content:space-between; position:relative; z-index:1; }

  .brand-mark { width:32px; height:32px; border-radius:9px; background:linear-gradient(135deg, var(--gold), var(--amber)); display:flex; align-items:center; justify-content:center; font-size:16px; }

  .greeting { margin-top:16px; position:relative; z-index:1; }
  .greeting h1 { font-family:var(--font-head); font-weight:600; font-size:20px; line-height:1.25; margin:0 0 4px; }
  .greeting p { margin:0; font-size:13px; color:rgba(255,255,255,0.8); line-height:1.4; }
  .stage-crumb { display:flex; align-items:center; gap:6px; margin-top:14px; position:relative; z-index:1; flex-wrap:wrap; }
  .crumb-chip { font-size:10.5px; font-weight:700; padding:4px 9px; border-radius:999px; background:rgba(255,255,255,0.12); color:rgba(255,255,255,0.65); letter-spacing:0.3px; }

  .crumb-arrow { color:rgba(255,255,255,0.35); font-size:11px; }

  .section-label:first-child { margin-top:2px; }

  .triage-card { background:var(--card); border:1px solid #E7E2D6; border-radius:var(--radius); padding:15px 16px; display:flex; align-items:center; gap:13px; cursor:pointer; text-align:left; width:100%; font-family:var(--font-body); box-shadow:0 1px 2px rgba(20,80,94,0.04); }
  .triage-card:active { transform:scale(0.98); }
  .triage-card .emoji { width:42px; height:42px; border-radius:12px; background:#EEF6F5; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
  .triage-card .txt-en { font-weight:600; font-size:14px; color:var(--ink); line-height:1.3; }
  .triage-card .txt-es { font-style:italic; font-size:11.5px; color:var(--ink-soft); margin-top:2px; }

  .bottomnav { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:440px; background:var(--white); border-top:1px solid #E7E2D6; display:flex; justify-content:space-around; padding:9px 4px calc(9px + env(safe-area-inset-bottom)); }

  .screen-header { display:flex; align-items:center; gap:12px; padding:16px 18px 6px; }

  .screen-title { font-family:var(--font-head); font-weight:600; font-size:17px; color:var(--ink); }

  .card { background:var(--card); border:1px solid #E7E2D6; border-radius:var(--radius); padding:18px; margin:12px 18px; }

  .step-list { list-style:none; padding:0; margin:0; }

  .step-list li:last-child { border-bottom:none; }
  .step-num { width:22px; height:22px; border-radius:50%; background:var(--gold); color:var(--teal-navy); font-weight:700; font-size:11px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }

  .primary-btn { width:100%; background:var(--amber); color:var(--white); border:none; border-radius:14px; padding:14px; font-weight:700; font-size:14px; font-family:var(--font-body); cursor:pointer; margin-top:4px; }
  .primary-btn:disabled { opacity:0.4; }
  .secondary-btn { width:100%; background:transparent; color:var(--teal-deep); border:1.5px solid var(--teal-deep); border-radius:14px; padding:12px; font-weight:700; font-size:13.5px; font-family:var(--font-body); cursor:pointer; margin-top:8px; }

  .field { margin-bottom:14px; }
  .field label { display:block; font-size:12px; font-weight:700; color:var(--ink-soft); margin-bottom:6px; }
  .field input, .field select, .field textarea { width:100%; padding:12px 13px; border-radius:12px; border:1.5px solid #E7E2D6; font-family:var(--font-body); font-size:14px; background:var(--white); color:var(--ink); }

  .choice-opt { display:block; width:100%; text-align:left; background:var(--white); border:1.5px solid #E7E2D6; border-radius:14px; padding:13px 15px; font-size:13.5px; font-weight:600; color:var(--ink); margin-bottom:9px; cursor:pointer; font-family:var(--font-body); }
  .choice-opt:active { background:#F5FAFA; border-color:var(--teal-mid); }
  .choice-opt.picked { background:var(--teal-deep); border-color:var(--teal-deep); color:var(--white); }

  .chip-grid { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:6px; }
  .chip { padding:9px 13px; border-radius:999px; border:1.5px solid #E7E2D6; font-size:12.5px; font-weight:600; cursor:pointer; background:var(--white); color:var(--ink); }
  .chip.picked { background:var(--gold); border-color:var(--gold); color:var(--teal-navy); }
  .chip-counter { font-size:12px; color:var(--ink-soft); font-weight:600; margin:8px 2px 14px; }

  .rank-item { display:flex; align-items:center; gap:10px; background:var(--white); border:1.5px solid #E7E2D6; border-radius:12px; padding:10px 12px; margin-bottom:8px; font-size:13.5px; font-weight:600; }
  .rank-item .rank-badge { width:24px; height:24px; border-radius:50%; background:var(--teal-deep); color:var(--white); font-size:11px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .rank-btns { display:flex; gap:4px; margin-left:auto; }
  .rank-btns button { border:none; background:#EEF6F5; color:var(--teal-deep); width:26px; height:26px; border-radius:8px; font-size:13px; cursor:pointer; }

  .progress-dots { display:flex; gap:6px; padding:0 18px 4px; }
  .progress-dots span { height:4px; flex:1; background:#E7E2D6; border-radius:2px; }
  .progress-dots span.done { background:var(--teal-deep); }

  .tag-row { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px; }
  .tag { background:#FCEFDD; color:var(--burnt); font-size:10.5px; font-weight:700; padding:4px 9px; border-radius:999px; }

  .locked-card { background:repeating-linear-gradient(135deg, #F1EDE3, #F1EDE3 10px, #EDE8DB 10px, #EDE8DB 20px); border-radius:var(--radius); margin:12px 18px; padding:16px; text-align:center; color:var(--ink-soft); border:1px dashed #D8D0BE; }
  .locked-card .lock-ic { font-size:19px; margin-bottom:5px; }
  .locked-card p { font-size:12px; margin:0; }

  .explore-grid { display:flex; flex-direction:column; gap:10px; }
  .assess-card { background:var(--card); border:1px solid #E7E2D6; border-radius:16px; padding:14px 15px; display:flex; align-items:center; gap:12px; cursor:pointer; }
  .assess-card .ic { width:40px; height:40px; border-radius:11px; display:flex; align-items:center; justify-content:center; font-size:19px; flex-shrink:0; }
  .assess-card .info { flex:1; }
  .assess-card h4 { margin:0 0 2px; font-size:13.5px; font-weight:700; font-family:var(--font-body); }
  .assess-card .es-sub { font-size:11px; font-style:italic; color:var(--ink-soft); }

  .profile-summary-card h3 { font-family:var(--font-head); font-size:15px; margin:0 0 10px; font-weight:600; }
  .summary-row { display:flex; justify-content:space-between; font-size:12.5px; padding:6px 0; border-bottom:1px solid rgba(255,255,255,0.15); }

  .career-card { background:var(--white); border:1px solid #E7E2D6; border-radius:14px; padding:13px 14px; margin-bottom:9px; }
  .career-card h4 { margin:0 0 3px; font-size:13.5px; font-family:var(--font-head); font-weight:600; }
  .career-card p { margin:0; font-size:12px; color:var(--ink-soft); }
</style>
</head>

/* ================= PHASE 3: LAYER 2 — cross-section synthesis engine ================= */
// Deterministic. Reads state.results/state.completed only. Never touches the vision reflection.

// Returns [{theme, sections}] for themes mentioned by 2+ DISTINCT completed sections, sorted
// by number of corroborating sections (desc), then by vocabulary order for stable ties.
function getEligibleThemes(){
  const themeSections = {}; // theme -> Set of section keys that mentioned it
  function mention(theme, sectionKey){
    if(!themeSections[theme]) themeSections[theme] = new Set();
    themeSections[theme].add(sectionKey);
  }
  if(state.completed.values && state.results.values){
    state.results.values.slice(0,2).forEach(v=>(v.tags||[]).forEach(tag=>mention(tag,'values')));
  }
  if(state.completed.strengths && state.results.strengths){
    state.results.strengths.forEach(s=>(s.tags||[]).forEach(tag=>mention(tag,'strengths')));
  }
  if(state.completed.interests && state.results.interests){
    const top = RIASEC.find(r=>r.code===state.results.interests[0].code);
    if(top) (top.tags||[]).forEach(tag=>mention(tag,'interests'));
  }
  if(state.completed.personality && state.results.personality){
    state.results.personality.code.split('').forEach(letter=>mention(PERSONALITY_DIMENSION_TAGS[letter],'personality'));
  }
  const vocabOrder = Object.keys(THEME_GLOSS);
  return Object.keys(themeSections)
    .filter(theme=>themeSections[theme].size>=2)
    .sort((a,b)=>{
      const diff = themeSections[b].size - themeSections[a].size;
      if(diff!==0) return diff;
      return vocabOrder.indexOf(a)-vocabOrder.indexOf(b);
    })
    .map(theme=>({theme, sections:themeSections[theme].size}));
}

// Geometric rule: do two eligible themes share an axis with opposite poles? Returns the first
// such pair found (deterministic order), or null. No hardcoded tension list.
function findAxisOpposition(eligible){
  for(let i=0;i<eligible.length;i++){
    for(let j=i+1;j<eligible.length;j++){
      const axesA = THEME_AXES[eligible[i].theme]||[];
      const axesB = THEME_AXES[eligible[j].theme]||[];
      for(const a of axesA){
        for(const b of axesB){
          if(a.axis===b.axis && a.pole!==b.pole){
            return [eligible[i].theme, eligible[j].theme];
          }
        }
      }
    }
  }
  return null;
}

function computeSynthesis(){
  const completedCount = Object.values(state.completed).filter(Boolean).length;
  if(completedCount < 2) return {type:'sparse'};
  const eligible = getEligibleThemes();
  if(eligible.length===0) return {type:'none'};
  const oppPair = findAxisOpposition(eligible);
  if(oppPair) return {type:'bothand', themeA:oppPair[0], themeB:oppPair[1]};
  if(eligible.length>=2) return {type:'reinforcing', theme1:eligible[0].theme, theme2:eligible[1].theme};
  return {type:'single', theme:eligible[0].theme};
}

function patternsSectionCopy(synthesis){
  const g = (theme)=>THEME_GLOSS[theme];
  if(synthesis.type==='sparse'){
    return {
      en:"You've only done one part so far, so there's nothing to compare yet, that's completely normal.",
      es:'Solo has hecho una parte hasta ahora, así que todavía no hay nada que comparar, y eso es totalmente normal.'
    };
  }
  if(synthesis.type==='none'){
    return {
      en:"Nothing's lining up clearly yet between the parts you've done, and that's okay too, sometimes it takes a few more pieces before a pattern shows up.",
      es:'Todavía no hay algo que coincida claramente entre las partes que hiciste, y está bien, a veces se necesitan más piezas para que aparezca un patrón.'
    };
  }
  if(synthesis.type==='single'){
    const t = g(synthesis.theme);
    return {
      en:`One thing I noticed: ${t.en} keeps showing up for you, in more than one place. Does that sound like you? It's just one piece of the picture.`,
      es:`Algo que noté: ${t.es} apareció en más de una parte. ¿Sientes que eso va contigo? Es solo una pieza del rompecabezas.`
    };
  }
  if(synthesis.type==='reinforcing'){
    const t1=g(synthesis.theme1), t2=g(synthesis.theme2);
    return {
      en:`Something that kept coming up is how much ${t1.en} matters to you, and ${t2.en} showed up right alongside it. Does that sound like you? It's just one piece of the picture.`,
      es:`Algo que apareció varias veces fue lo importante que es para ti ${t1.es}, y ${t2.es} apareció justo al lado. ¿Sientes que eso va contigo? Es solo una pieza del rompecabezas.`
    };
  }
  // bothand
  const tA=g(synthesis.themeA), tB=g(synthesis.themeB);
  return {
    en:`Two things kept coming up: ${tA.en} really matters to you, and so does ${tB.en}. Those aren't in competition, plenty of people want both at once. Does that sound like you?`,
    es:`Dos cosas se repitieron bastante: ${tA.es} te importa de verdad, y también ${tB.es}. Esas dos cosas no compiten entre sí, a muchas personas les gustan las dos cosas al mismo tiempo. ¿Sientes que eso va contigo?`
  };
}

/* ================= PHASE 3: LAYER 3 — pathway rationale (career-matching logic itself is unchanged, Phase 4) ================= */
function composePathwayRationale(topCode, synthesis){
  const riasecTags = (RIASEC.find(r=>r.code===topCode)||{}).tags || [];
  const matched = riasecTags.find(tag=>{
    if(synthesis.type==='bothand') return tag===synthesis.themeA || tag===synthesis.themeB;
    if(synthesis.type==='reinforcing') return tag===synthesis.theme1 || tag===synthesis.theme2;
    if(synthesis.type==='single') return tag===synthesis.theme;
    return false;
  });
  if(matched){
    const g = THEME_GLOSS[matched];
    return {
      en:`This one's here because you lean toward ${g.en}, and that's shown up in more than one place.`,
      es:`Esto aparece porque te inclinas hacia ${g.es}, algo que se ha notado en más de un lugar.`
    };
  }
  return {
    en:"This is one possibility. It's simply connected to something you said you enjoy.",
    es:'Esta es una posibilidad. Aparece porque se relaciona con algo que dijiste que disfrutas.'
  };
}

function questionsToKeepExploringCopy(synthesis){
  const g = (theme)=>THEME_GLOSS[theme];
  if(synthesis.type==='sparse' || synthesis.type==='none'){
    const v = state.results.values;
    if(v){
      return {
        en:`${v[0].en} and ${v[1].en} stood out to you. Whenever you're ready, another section might add one more piece to this.`,
        es:`${v[0].es} y ${v[1].es} resaltaron para ti. Cuando estés listo o lista, otra sección podría sumar otra pieza a esto.`
      };
    }
    return {
      en:"There's more to add here whenever you're ready, no rush.",
      es:'Hay más que agregar aquí cuando estés listo o lista, sin prisa.'
    };
  }
  if(synthesis.type==='bothand'){
    const tA=g(synthesis.themeA), tB=g(synthesis.themeB);
    return {
      en:`You seem to want ${tA.en} and ${tB.en} at the same time. Is there a version of your future where both are true, instead of picking one? Worth talking through with your family, or at Clínica.`,
      es:`Parece que quieres ${tA.es} y ${tB.es} al mismo tiempo. ¿Hay una versión de tu futuro donde las dos cosas sean ciertas, en lugar de elegir una? Vale la pena platicarlo en familia, o en la Clínica.`
    };
  }
  const theme = synthesis.type==='single' ? synthesis.theme : synthesis.theme1;
  const t = g(theme);
  return {
    en:`${t.en.charAt(0).toUpperCase()+t.en.slice(1)} keeps showing up for you. Where have you noticed that in your own life?`,
    es:`${t.es.charAt(0).toUpperCase()+t.es.slice(1)} ha salido varias veces. ¿Dónde lo has notado en tu propia vida?`
  };
}

function exploreScreen(){
  const wrap=el('div');
  wrap.appendChild(screenHeader(isEn()?'Explore':'Explorar'));
  const n = Object.values(state.completed).filter(Boolean).length;
  const showVisionInline = (n===0 && !state.visionAsked);

  const intro=el('div','card');
  if(n===4){
    intro.appendChild(el('h2','', isEn()?'A Few Things Are Starting to Stand Out':'Algunas cosas empiezan a destacar'));
    intro.appendChild(el('p','', isEn()?'You\'ve shared some important pieces, what matters to you, the strengths you bring, what you enjoy, and how you go about things. A few patterns are starting to come into focus. Let\'s look at them together.':'Has compartido algunas piezas importantes, lo que te importa, las fortalezas que aportas, lo que disfrutas, y cómo sueles hacer las cosas. Algunos patrones empiezan a tomar forma. Vamos a verlos juntos.'));
  } else if(n>0){
    intro.appendChild(el('h2','', isEn()?'Good to See You Again':'Qué bueno verte de nuevo'));
    intro.appendChild(el('p','', isEn()?"You've already explored part of this. Whenever you're ready, let's keep going.":'Ya exploraste parte de esto. Cuando estés listo o lista, sigamos.'));
  } else {
    intro.appendChild(el('h2','', isEn()?'Let\'s Spend a Little Time Getting to Know You':'Vamos a dedicar un poco de tiempo a conocerte'));
    intro.appendChild(el('p','', isEn()?"This isn't a test, and there's nothing to study for. It's a few short sections about what matters to you, the strengths you bring, what you enjoy, and how you go about things. Take it at whatever pace works for you.":'Esto no es un examen, y no hay nada que estudiar. Son unas secciones cortas sobre lo que te importa, las fortalezas que aportas, lo que disfrutas, y cómo sueles hacer las cosas. Tómalo al ritmo que te funcione.'));
  }
  wrap.appendChild(intro);

  if(showVisionInline){
    wrap.appendChild(buildVisionCard(false));
    return wrap; // primary action, progress, and jump-list appear only after the opening question is handled
  }

  // primary action + progress
  const actionCard=el('div','card');
  if(n===4){
    actionCard.appendChild(el('p','', exploreProgressText(n)));
    const btn=el('button','primary-btn', isEn()?'See what stands out':'Ver lo que destaca');
    btn.onclick=()=>{ state.screen='pathprofile'; render(); };
    actionCard.appendChild(btn);
  } else {
    const dots = el('div','progress-dots');
    for(let i=0;i<4;i++) dots.appendChild(el('span', i<n?'done':''));
    actionCard.appendChild(dots);
    actionCard.appendChild(el('p','', exploreProgressText(n)));
    const sequence = ['values','strengths','interests','personality'];
    const screenFor = {values:'assess-values', strengths:'assess-strengths', interests:'assess-interests', personality:'assess-personality'};
    const nextKey = sequence.find(k=>!state.completed[k]) || sequence[0];
    const btn=el('button','primary-btn', isEn()?(n===0?"Let's begin":'Keep going'):(n===0?'Comencemos':'Sigamos'));
    btn.onclick=()=>{ state.screen=screenFor[nextKey]; render(); };
    actionCard.appendChild(btn);
    if(n>0){
      const preview=el('button','secondary-btn', isEn()?'Preview what we\'ve learned so far':'Ver un adelanto de lo aprendido');
      preview.onclick=()=>{ state.screen='pathprofile'; render(); };
      actionCard.appendChild(preview);
    }
  }
  wrap.appendChild(actionCard);

  // quiet jump-list, always available, never locked
  const jumpCard=el('div','card');
  jumpCard.appendChild(el('div','section-label', isEn()?'Want to jump to a specific part instead?':'¿Prefieres ir directo a una parte en particular?'));
  const jumpItems=[
    {key:'values', screen:'assess-values', titleEn:'What matters to you', titleEs:'Lo que te importa'},
    {key:'strengths', screen:'assess-strengths', titleEn:'The strengths you bring', titleEs:'Las fortalezas que aportas'},
    {key:'interests', screen:'assess-interests', titleEn:'What you enjoy', titleEs:'Lo que te interesa'},
    {key:'personality', screen:'assess-personality', titleEn:'How you go about things', titleEs:'Cómo sueles hacer las cosas'},
  ];
  jumpItems.forEach(item=>{
    const row=el('button','choice-opt');
    const done=state.completed[item.key];
    row.style.display='flex'; row.style.justifyContent='space-between'; row.style.alignItems='center';
    row.innerHTML=`<span>${isEn()?item.titleEn:item.titleEs}</span><span>${done?'✓':'›'}</span>`;
    row.onclick=()=>{ state.screen=item.screen; render(); };
    jumpCard.appendChild(row);
  });
  const visionRow=el('button','choice-opt');
  visionRow.style.display='flex'; visionRow.style.justifyContent='space-between'; visionRow.style.alignItems='center';
  visionRow.innerHTML=`<span>${isEn()?"Add a note about the life you're imagining":'Agregar una nota sobre la vida que imaginas'}</span><span>${state.visionReflection?'✓':'›'}</span>`;
  visionRow.onclick=()=>{ state.screen='assess-vision'; render(); };
  jumpCard.appendChild(visionRow);
  wrap.appendChild(jumpCard);

  if(n>0 || state.visionAsked){
    const resetLink=document.createElement('div');
    resetLink.style.textAlign='center'; resetLink.style.margin='6px 18px 18px';
    const resetBtn=document.createElement('button');
    resetBtn.textContent = isEn()?'Start Explore over':'Empezar Explorar de nuevo';
    resetBtn.style.background='none'; resetBtn.style.border='none'; resetBtn.style.color='var(--ink-soft)';
    resetBtn.style.fontSize='12px'; resetBtn.style.fontFamily='var(--font-body)'; resetBtn.style.textDecoration='underline';
    resetBtn.style.cursor='pointer';
    resetBtn.onclick=()=>{ state.resetReturnTo='explore'; state.screen='reset-confirm'; render(); };
    resetLink.appendChild(resetBtn);
    wrap.appendChild(resetLink);
  }

  return wrap;
}

/* ============ VALUES ASSESSMENT ============ */
function valuesScreen(){
  const wrap=el('div');
  wrap.appendChild(screenHeader(isEn()?'Discover Your Core Values':'Descubre Tus Valores Centrales','explore'));
  if(state.valuesStep===0){
    const card=el('div','card');
    card.appendChild(el('div','pill', isEn()?'STEP 1 OF 2 · SELECT':'PASO 1 DE 2 · SELECCIONA'));
    card.appendChild(el('h2','', isEn()?'Select any that resonate':'Selecciona las que resuenen contigo'));
    const grid=el('div','chip-grid');
    VALUES.forEach(v=>{
      const c=el('button','chip'+(state.valuesSelected.includes(v.id)?' picked':''), isEn()?v.en:v.es);
      c.onclick=()=>{
        const i=state.valuesSelected.indexOf(v.id);
        if(i>-1) state.valuesSelected.splice(i,1); else state.valuesSelected.push(v.id);
        render();
      };
      grid.appendChild(c);
    });
    card.appendChild(grid);
    card.appendChild(el('div','chip-counter', isEn()?`${state.valuesSelected.length} selected`:`${state.valuesSelected.length} seleccionadas`));
    const btn=el('button','primary-btn', isEn()?'Next: rank your top 5':'Siguiente: clasifica tus 5');
    btn.disabled = state.valuesSelected.length<5;
    btn.onclick=()=>{ if(state.valuesSelected.length>=5){ state.valuesRanked = []; state.valuesStep=1; render(); } };
    card.appendChild(btn);
    wrap.appendChild(card);
  } else if(state.valuesStep===1){
    const card=el('div','card');
    card.appendChild(el('div','pill', isEn()?'STEP 2 OF 2 · RANK TOP 5':'PASO 2 DE 2 · CLASIFICA'));

    if(state.valuesRanked.length<5){
      card.appendChild(el('h2','', isEn()?'Tap them in order, most important first':'Tócalos en orden, el más importante primero'));
      card.appendChild(el('p','', isEn()?`${5-state.valuesRanked.length} more to go`:`${5-state.valuesRanked.length} más`));
      const grid=el('div','chip-grid');
      state.valuesSelected.filter(id=>!state.valuesRanked.includes(id)).forEach(id=>{
        const v=VALUES.find(x=>x.id===id);
        const c=el('button','chip', isEn()?v.en:v.es);
        c.onclick=()=>{ state.valuesRanked.push(id); render(); };
        grid.appendChild(c);
      });
      card.appendChild(grid);
    }

    if(state.valuesRanked.length>0){
      card.appendChild(el('div','section-label', isEn()?'Your order so far':'Tu orden hasta ahora'));
      state.valuesRanked.forEach((id,i)=>{
        const v=VALUES.find(x=>x.id===id);
        const row=el('div','rank-item');
        row.innerHTML=`<span class="rank-badge">${i+1}</span><span>${isEn()?v.en:v.es}</span>`;
        const btns=el('div','rank-btns');
        const up=el('button','','↑'); up.onclick=()=>{ if(i>0){ [state.valuesRanked[i-1],state.valuesRanked[i]]=[state.valuesRanked[i],state.valuesRanked[i-1]]; render(); } };
        const down=el('button','','↓'); down.onclick=()=>{ if(i<state.valuesRanked.length-1){ [state.valuesRanked[i+1],state.valuesRanked[i]]=[state.valuesRanked[i],state.valuesRanked[i+1]]; render(); } };
        const rm=el('button','','✕'); rm.onclick=()=>{ state.valuesRanked.splice(i,1); render(); };
        btns.appendChild(up); btns.appendChild(down); btns.appendChild(rm);
        row.appendChild(btns);
        card.appendChild(row);
      });
    }

    const btn=el('button','primary-btn', isEn()?'See my results':'Ver mis resultados');
    btn.disabled = state.valuesRanked.length<5;
    btn.onclick=()=>{
      if(state.valuesRanked.length===5){
        state.results.values = state.valuesRanked.map(id=>VALUES.find(v=>v.id===id));
        state.completed.values=true;
        state.valuesStep=2; render();
      }
    };
    card.appendChild(btn);
    wrap.appendChild(card);
  } else {
    const card=el('div','card confirm-box');
    card.appendChild(el('div','confirm-icon','💛'));
    const reflection = composeValuesReflection();
    card.appendChild(el('p','', isEn()?reflection.en:reflection.es));
    card.appendChild(el('div','divider'));
    card.appendChild(el('h2','', isEn()?'Your top values':'Tus valores principales'));
    const list=el('ul','step-list');
    state.results.values.forEach((v,i)=>{ const li=el('li'); li.innerHTML=`<span class="step-num">${i+1}</span><span>${isEn()?v.en:v.es}</span>`; list.appendChild(li); });
    card.appendChild(list);
    card.appendChild(el('p','es', isEn()?"Let's see what else stands out.":'Veamos qué más resalta.'));
    const btn=el('button','primary-btn', isEn()?'Back to Explore':'Volver a Explorar');
    btn.onclick=()=>{ state.screen='explore'; render(); };
    card.appendChild(btn);
    wrap.appendChild(card);
  }
  return wrap;
}

  rows.forEach(r=>{ const row=el('div','summary-row'); row.innerHTML=`<span>${r.label}</span><b>${r.val}</b>`; summary.appendChild(row); });
  wrap.appendChild(summary);

  // ---- Patterns worth noticing (Layer 2 synthesis) ----
  const synthesis = computeSynthesis();
  const patternsCopy = patternsSectionCopy(synthesis);
  const patternsCard=el('div','card');
  patternsCard.appendChild(el('div','section-label', isEn()?'Patterns worth noticing':'Patrones que vale la pena notar'));
  patternsCard.appendChild(el('p','', isEn()?patternsCopy.en:patternsCopy.es));
  wrap.appendChild(patternsCard);

  // ---- Questions to discuss with family (unchanged from Phase 1) ----
  const card=el('div','card');
  card.appendChild(el('div','section-label', isEn()?'Questions to discuss with family':'Preguntas para hablar en familia'));
  const qs = isEn()
    ? ["What matters most to you as you think about what's next?","What do you hope the future makes possible for you?","What's one worry about this that's okay to just say out loud?"]
    : ["¿Qué es lo más importante para ti al pensar en lo que sigue?","¿Qué esperas que el futuro haga posible para ti?","¿Qué preocupación sobre esto está bien decir en voz alta?"];
  const list=el('ul','step-list');
  qs.forEach((q,i)=>{ const li=el('li'); li.innerHTML=`<span class="step-num">${i+1}</span><span>${q}</span>`; list.appendChild(li); });
  card.appendChild(list);
  wrap.appendChild(card);

  // ---- Possibilities to explore (Layer 3: framing only, CAREER_MAP itself unchanged, that's Phase 4) ----
  const topCode = state.results.interests ? state.results.interests[0].code : null;
  wrap.appendChild(el('div','section-label', isEn()?'Possibilities to explore':'Posibilidades para explorar'));
  const careerWrap=el('div'); careerWrap.style.margin='0 18px 8px';
  if(topCode){
    CAREER_MAP[topCode].forEach(c=>{
      const rationale = composePathwayRationale(topCode, synthesis);
      const cc=el('div','career-card');
      cc.innerHTML=`<h4>${isEn()?c.en:c.es}</h4><p>${isEn()?c.credEn:c.credEs}</p><p style="margin-top:6px;">${isEn()?rationale.en:rationale.es}</p>`;
      careerWrap.appendChild(cc);
    });
    const humility=el('p','es');
    humility.style.margin='6px 4px 0';
    humility.textContent = isEn()?'These are a few things you could look into, not a decision you have to make.':'Son algunas cosas que podrías investigar, no una decisión que tengas que tomar.';
    careerWrap.appendChild(humility);
  } else {
    const cc=el('div','career-card');
    cc.innerHTML=`<h4>${isEn()?"We'd need to know a bit about what you enjoy day to day before naming anything here.":'Necesitaríamos saber un poco sobre lo que disfrutas en tu día a día antes de nombrar algo aquí.'}</h4><p>${isEn()?'"What Do You Enjoy?" is a good next one, whenever you\'re ready.':'"¿Qué Disfrutas?" es una buena siguiente, cuando estés listo o lista.'}</p>`;
    careerWrap.appendChild(cc);
  }
  wrap.appendChild(careerWrap);

  const card2=el('div','card');
  card2.appendChild(el('div','pill', isEn()?'NEXT STEP':'PRÓXIMO PASO'));
  card2.appendChild(el('h2','', isEn()?'A Good Next Step':'Un buen próximo paso'));
  card2.appendChild(el('p','', isEn()?"Our Career Exploration workshop builds on what you've shared here, connecting what matters to you with real paths forward.":'Nuestro taller de Exploración de Carreras se basa en lo que has compartido aquí, conectando lo que te importa con caminos reales hacia adelante.'));
  const btn1=el('button','secondary-btn', isEn()?'Talk it through at Clínica':'Hablarlo en la Clínica');
  btn1.onclick=()=>{ state.screen='clinica'; render(); };
  card2.appendChild(btn1);
  wrap.appendChild(card2);

  // ---- Questions to keep exploring (closes the profile as an invitation, not a verdict) ----
  const questionsCopy = questionsToKeepExploringCopy(synthesis);
  const qCard=el('div','card');
  qCard.appendChild(el('div','section-label', isEn()?'Questions to keep exploring':'Preguntas para seguir explorando'));
  qCard.appendChild(el('p','', isEn()?questionsCopy.en:questionsCopy.es));
  wrap.appendChild(qCard);

  // ---- Vision reflection echo: verbatim, presence-only, never interpreted ----
  if(state.visionReflection && state.visionReflection.trim()){
    const vCard=el('div','card');
    vCard.appendChild(el('p','', isEn()
      ? `You also told us, in your own words: "${state.visionReflection}". Keep that close as you think about what's next.`
      : `También nos dijiste, con tus propias palabras: "${state.visionReflection}". Tenlo presente al pensar en lo que sigue.`));
    wrap.appendChild(vCard);
  }

  const card3=el('div','card');
  card3.appendChild(el('h2','', isEn()?'Continue to Decide':'Continuar a Decidir'));
  card3.appendChild(el('p','', isEn()?'Compare the cost, time, and outlook for the paths above.':'Compara el costo, tiempo y perspectiva de los caminos anteriores.'));
  const btn2=el('button','primary-btn', isEn()?'Continue →':'Continuar →');
  btn2.onclick=()=>{ state.screen='decide'; render(); };
  card3.appendChild(btn2);
  wrap.appendChild(card3);

  const resetLink=document.createElement('div');
  resetLink.style.textAlign='center'; resetLink.style.margin='6px 18px 18px';
  const resetBtn=document.createElement('button');
  resetBtn.textContent = isEn()?'Start Explore over':'Empezar Explorar de nuevo';
  resetBtn.style.background='none'; resetBtn.style.border='none'; resetBtn.style.color='var(--ink-soft)';
  resetBtn.style.fontSize='12px'; resetBtn.style.fontFamily='var(--font-body)'; resetBtn.style.textDecoration='underline';
  resetBtn.style.cursor='pointer';
  resetBtn.onclick=()=>{ state.resetReturnTo='pathprofile'; state.screen='reset-confirm'; render(); };
  resetLink.appendChild(resetBtn);
  wrap.appendChild(resetLink);

  return wrap;
}

/* ============ DECIDE — family affordability snapshot ============ */
function decideAffordScreen(){
  const wrap=el('div');
  wrap.appendChild(decideStageHeader(isEn()?'Family Affordability Snapshot':'Resumen de Asequibilidad Familiar'));

  const card=el('div','card');
  card.appendChild(el('div','pill', isEn()?'ROUGH ESTIMATE, NOT OFFICIAL':'ESTIMADO APROXIMADO, NO OFICIAL'));
  card.appendChild(el('h2','', isEn()?'A starting point for the conversation':'Un punto de partida para la conversación'));
  card.appendChild(el('p','', isEn()?'This gives you a general sense of the gap between cost and what your family might realistically cover. Your real FAFSA/TASFA numbers will be more accurate, a Navigator can walk through those with you.':'Esto te da una idea general de la diferencia entre el costo y lo que tu familia podría cubrir. Tus números reales de FAFSA/TASFA serán más precisos, un Navegador puede revisarlos contigo.'));

  const f1=el('div','field');
  f1.innerHTML=`<label>${isEn()?'Estimated annual cost of the school or program':'Costo anual estimado de la escuela o programa'}</label><input type="number" id="affCost" placeholder="$10,000">`;
  card.appendChild(f1);

  const f2=el('div','field');
  f2.innerHTML=`<label>${isEn()?'Household income range':'Rango de ingreso familiar'}</label>
    <select id="affIncome">
      <option value="0.85">${isEn()?'Under $30,000':'Menos de $30,000'}</option>
      <option value="0.65">${isEn()?'$30,000–$50,000':'$30,000–$50,000'}</option>
      <option value="0.45">${isEn()?'$50,000–$75,000':'$50,000–$75,000'}</option>
      <option value="0.25">${isEn()?'$75,000–$100,000':'$75,000–$100,000'}</option>
      <option value="0.10">${isEn()?'Over $100,000':'Más de $100,000'}</option>
    </select>`;
  card.appendChild(f2);

  const f3=el('div','field');
  f3.innerHTML=`<label>${isEn()?'Scholarships or grants you already expect (optional)':'Becas o subvenciones que ya esperas (opcional)'}</label><input type="number" id="affAid" placeholder="$0">`;
  card.appendChild(f3);

  const resultBox=el('div'); resultBox.id='affResult';
  card.appendChild(resultBox);

  const btn=el('button','primary-btn', isEn()?'See my snapshot':'Ver mi resumen');
  btn.onclick=()=>{
    const cost = parseFloat(document.getElementById('affCost').value) || 0;
    const aidFactor = parseFloat(document.getElementById('affIncome').value);
    const knownAid = parseFloat(document.getElementById('affAid').value) || 0;
    const estAidPortion = cost * aidFactor;
    const netPrice = Math.max(0, cost - knownAid - estAidPortion);
    resultBox.innerHTML = `
      <div class="profile-summary-card" style="margin:14px 0 4px;">
        <h3>${isEn()?'Estimated snapshot':'Resumen estimado'}</h3>
        <div class="summary-row"><span>${isEn()?'Total cost':'Costo total'}</span><b>$${cost.toLocaleString()}</b></div>
        <div class="summary-row"><span>${isEn()?'Known scholarships':'Becas conocidas'}</span><b>$${knownAid.toLocaleString()}</b></div>
        <div class="summary-row"><span>${isEn()?'Estimated aid range':'Rango de ayuda estimada'}</span><b>~$${Math.round(estAidPortion).toLocaleString()}</b></div>
        <div class="summary-row"><span>${isEn()?'Your family might cover':'Tu familia podría cubrir'}</span><b>~$${Math.round(netPrice).toLocaleString()}/yr</b></div>
      </div>`;
  };
  card.appendChild(btn);
  wrap.appendChild(card);

  const note=el('div','locked-card');
  note.innerHTML=`<div class="lock-ic">ℹ️</div><p>${isEn()?'This uses a simplified estimate, not the federal FAFSA formula. Bring your actual FAFSA/TASFA Student Aid Report to Clínica for real numbers.':'Esto usa un estimado simplificado, no la fórmula federal de FAFSA. Trae tu Reporte de Ayuda Estudiantil real a la Clínica para números precisos.'}</p>`;
  wrap.appendChild(note);

  return wrap;
}

  return wrap;

// ---- Filtering layer: reads state + SCHOLARSHIP_DATA, returns filtered records. No rendering here. ----
function getFilteredScholarships(){
  let results = SCHOLARSHIP_DATA;
  if(state.scholarshipCategory){
    results = results.filter(r=>r.category===state.scholarshipCategory);
  }
  const q = state.scholarshipSearch.trim().toLowerCase();
  if(q){
    results = results.filter(r=>{
      const hay = [r.institution, r.organization, r.programName, r.familyNote, r.familyNoteEs].filter(Boolean).join(' ').toLowerCase();
      return hay.includes(q);
    });
  }
  if(state.scholarshipEligFilters.length>0){
    results = results.filter(r=>{
      return state.scholarshipEligFilters.every(filterKey=>{
        const filterDef = SCHOLARSHIP_ELIGIBILITY_FILTERS.find(f=>f.key===filterKey);
        return filterDef.tags.some(tag=>r.eligibilityTags.includes(tag));
      });
    });
  }
  if(state.scholarshipGpaBand!=='any'){
    const band = SCHOLARSHIP_GPA_BANDS.find(b=>b.key===state.scholarshipGpaBand);
    results = results.filter(r=>band.test(r.gpaMin));
  }
  if(state.scholarshipAmountBand!=='any'){
    const band = SCHOLARSHIP_AMOUNT_BANDS.find(b=>b.key===state.scholarshipAmountBand);
    results = results.filter(r=>band.test(r.awardAmountMin));
  }
  return results;
}
function scholarshipDisplayName(r){ return r.institution || r.organization || ''; }
function bilingualField(en, es){ return isEn() ? en : (es || en); }
function hasActiveScholarshipFilters(){
  return state.scholarshipSearch.trim()!=='' || state.scholarshipEligFilters.length>0 || state.scholarshipGpaBand!=='any' || state.scholarshipAmountBand!=='any';
}
function clearScholarshipFilters(){
  state.scholarshipSearch=''; state.scholarshipEligFilters=[]; state.scholarshipGpaBand='any'; state.scholarshipAmountBand='any';
}

// ---- Card renderer, shared by list and saved screens ----
function scholarshipCard(r){
  const card=el('div','card');
  card.style.cursor='pointer';
  const name = scholarshipDisplayName(r);
  const isSaved = state.savedScholarships.includes(r.id);
  const catLabel = SCHOLARSHIP_CATEGORY_LABELS[r.category];
  card.innerHTML = `<div class="pill">${isEn()?catLabel.en:catLabel.es}</div>
    <h2 style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
      <span>${name}</span><span style="font-size:19px;flex-shrink:0;">${isSaved?'❤️':'🤍'}</span>
    </h2>
    <p style="font-size:12.5px;color:var(--ink-soft);margin:0 0 8px;">${r.programName||''}</p>`;
  const metaRow=el('div','tag-row');
  if(r.awardAmountText) metaRow.appendChild(el('span','tag', bilingualField(r.awardAmountText, r.awardAmountTextEs)));
  if(r.deadlineText) metaRow.appendChild(el('span','tag', bilingualField(r.deadlineText, r.deadlineTextEs)));
  card.appendChild(metaRow);
  if(r.eligibilityPlain && r.eligibilityPlain.length>0){
    const elig=document.createElement('div');
    elig.style.fontSize='12px'; elig.style.color='var(--teal-deep)'; elig.style.marginBottom='6px';
    elig.textContent = (isEn()?r.eligibilityPlain[0].en:r.eligibilityPlain[0].es);
    card.appendChild(elig);
  }
  if(r.verificationStatus && r.verificationStatus!=='confirmed' && VERIFICATION_COPY[r.verificationStatus]){
    const vc = VERIFICATION_COPY[r.verificationStatus];
    const statusLine=document.createElement('div');
    statusLine.style.fontSize='11.5px'; statusLine.style.color='var(--burnt)'; statusLine.style.marginBottom='6px';
    statusLine.textContent = isEn()?vc.en:vc.es;
    card.appendChild(statusLine);
  }
  if(r.familyNote){
    const note=el('p','es');
    note.textContent = isEn() ? r.familyNote : (r.familyNoteEs || r.familyNote);
    card.appendChild(note);
  }
  const heartBtn=el('button','secondary-btn', isSaved?(isEn()?'Remove from Saved':'Quitar de Guardadas'):(isEn()?'Save for Later':'Guardar para Después'));
  heartBtn.onclick=(e)=>{
    e.stopPropagation();
    const i=state.savedScholarships.indexOf(r.id);
    if(i>-1) state.savedScholarships.splice(i,1); else state.savedScholarships.push(r.id);
    render();
  };
  card.appendChild(heartBtn);
  card.addEventListener('click', (e)=>{
    if(e.target===heartBtn) return;
    state.scholarshipDetailId=r.id; state.screen='apply-scholarships-detail'; render();
  });
  return card;
}

  card4.appendChild(el('p','', isEn()?"Clínica is a group, drop-in setting. If that doesn't feel right for your situation, you can request a one-on-one meeting with a Navigator instead. This is a request, not an instant booking, someone will follow up with you.":'La Clínica es un espacio grupal, sin cita previa. Si eso no se siente adecuado para tu situación, puedes pedir una reunión individual con un Navegador. Esto es una solicitud, no una cita inmediata, alguien te dará seguimiento.'));
  const privBtn=el('button','secondary-btn', isEn()?'Request a Private Meeting':'Solicitar una Reunión Privada');
  privBtn.onclick=()=>{ window.open(PRIVATE_MEETING_FORM_URL, '_blank', 'noopener,noreferrer'); };
  card4.appendChild(privBtn);
  wrap.appendChild(card4);

  return wrap;
}

/* ============ FAMILY PROFILE ============ */
function familyScreen(){
  const wrap=el('div');
  wrap.appendChild(screenHeader(isEn()?'Family':'Familia'));
  const card=el('div','card');
  card.appendChild(el('div','pill', isEn()?'ONE FAMILY, ONE PROFILE':'UNA FAMILIA, UN PERFIL'));
  card.appendChild(el('h2','', isEn()?'This is where everything lives':'Aquí vive todo'));
  card.appendChild(el('p','', isEn()?'Explore results, Clínica appointments, and workshop history all connect to one family profile, not separate logins for separate tools.':'Los resultados de Explorar, citas de Clínica e historial de talleres se conectan a un solo perfil familiar, no a inicios de sesión separados.'));
  wrap.appendChild(card);

  const card2=el('div','card');
  card2.appendChild(el('div','section-label', isEn()?'Explore progress':'Progreso de Explorar'));
  const n=Object.values(state.completed).filter(Boolean).length;
  const dots=el('div','progress-dots'); for(let i=0;i<4;i++) dots.appendChild(el('span', i<n?'done':''));
  card2.appendChild(dots);
  card2.appendChild(el('p','', exploreProgressText(n)));
  if(n>0){ const btn=el('button','secondary-btn', isEn()?'View Path Profile':'Ver Perfil de Camino'); btn.onclick=()=>{state.screen='pathprofile';render();}; card2.appendChild(btn); }
  wrap.appendChild(card2);

  const card3=el('div','card');
  card3.appendChild(el('div','section-label', isEn()?'Clínica':'Clínica'));
  card3.appendChild(el('p','', isEn()?'Drop-in, Thursdays 5:00–8:00 PM. No appointment needed.':'Sin cita, los jueves de 5:00 a 8:00 PM. No necesitas reservar.'));
  const btn2=el('button','secondary-btn', isEn()?'Go to Clínica':'Ir a la Clínica');
  btn2.onclick=()=>{ state.screen='clinica'; render(); };
  card3.appendChild(btn2);
  wrap.appendChild(card3);

  return wrap;
}

render();
</script>
